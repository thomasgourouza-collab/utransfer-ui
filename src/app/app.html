<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="sidenav.toggle()" aria-label="Toggle navigation">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="app-title">Utransfer UI</span>
  <span class="spacer"></span>

  @if (masterPassword.isUnlocked()) {
    <button
      mat-icon-button
      matTooltip="Lock saved credentials"
      (click)="masterPassword.lock()"
    >
      <mat-icon>lock_open</mat-icon>
    </button>
  } @else if (masterPassword.isInitialized()) {
    <button
      mat-icon-button
      matTooltip="Unlock saved credentials"
      (click)="unlock()"
    >
      <mat-icon>lock</mat-icon>
    </button>
  }

  <app-theme-toggle></app-theme-toggle>
</mat-toolbar>

<mat-sidenav-container class="app-sidenav-container">
  <mat-sidenav #sidenav mode="side" opened class="app-sidenav">
    <mat-nav-list>
      <a
        mat-list-item
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        <mat-icon matListItemIcon>dashboard</mat-icon>
        <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/wizard" routerLinkActive="active">
        <mat-icon matListItemIcon>auto_fix_high</mat-icon>
        <span matListItemTitle>Build a transfer</span>
      </a>
      <a mat-list-item routerLink="/power" routerLinkActive="active">
        <mat-icon matListItemIcon>tune</mat-icon>
        <span matListItemTitle>Power user</span>
      </a>

      <mat-divider></mat-divider>

      <a mat-list-item routerLink="/profiles" routerLinkActive="active">
        <mat-icon matListItemIcon>dns</mat-icon>
        <span matListItemTitle>Server profiles</span>
      </a>
      <a mat-list-item routerLink="/presets" routerLinkActive="active">
        <mat-icon matListItemIcon>bookmark</mat-icon>
        <span matListItemTitle>Presets</span>
      </a>
      <a mat-list-item routerLink="/history" routerLinkActive="active">
        <mat-icon matListItemIcon>history</mat-icon>
        <span matListItemTitle>History</span>
      </a>

      <mat-divider></mat-divider>

      <a mat-list-item routerLink="/settings" routerLinkActive="active">
        <mat-icon matListItemIcon>settings</mat-icon>
        <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
