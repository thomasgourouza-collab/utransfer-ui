name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Build Angular app with repo base href
        run: |
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          echo "Building with --base-href /${REPO_NAME}/"
          npx ng build --configuration production --base-href "/${REPO_NAME}/"

      - name: Configure SPA fallback for client-side routing
        run: |
          cp dist/utransfer-ui/browser/index.html dist/utransfer-ui/browser/404.html
          touch dist/utransfer-ui/browser/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/utransfer-ui/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
